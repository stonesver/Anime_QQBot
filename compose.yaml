name: anime-qqbot

x-app: &app
  image: anime-qqbot:${IMAGE_TAG:-latest}
  build:
    context: .
  env_file:
    - path: .env
      required: false
  environment:
    APP_ENV: production
    DATABASE_URL: postgresql+asyncpg://anime:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/anime
  init: true
  restart: unless-stopped
  stop_grace_period: 20s
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    image: postgres:17.4-alpine
    environment:
      POSTGRES_DB: anime
      POSTGRES_USER: anime
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime -d anime"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  migrate:
    <<: *app
    command: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    <<: *app
    command: ["bot"]
    ports:
      - "127.0.0.1:${QQ_WEBHOOK_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5

  worker:
    <<: *app
    command: ["worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health/ready', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:

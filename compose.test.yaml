services:
  postgres-test:
    image: postgres:17.4-alpine
    environment:
      POSTGRES_DB: anime_test
      POSTGRES_USER: anime
      POSTGRES_PASSWORD: anime
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime -d anime_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

